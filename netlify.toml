[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self' https://plausible.io; connect-src 'self' https://plausible.io; form-action 'self' https://formsubmit.co; frame-ancestors 'none'; base-uri 'self'"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "/claims"
  to = "/claims/"
  status = 301

[[redirects]]
  from = "/methodology"
  to = "/methodology/"
  status = 301

[[redirects]]
  from = "/sources"
  to = "/sources/"
  status = 301

[[redirects]]
  from = "/newsletter"
  to = "/newsletter/"
  status = 301

[[redirects]]
  from = "/submit-claim"
  to = "/submit-claim/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
